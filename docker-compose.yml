version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: voting_db
      POSTGRES_USER: voting_user
      POSTGRES_PASSWORD: voting_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    environment:
      - DJANGO_SECRET_KEY=super-secret-production-key-change-me
      - DJANGO_DEBUG=False
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=voting_db
      - DB_USER=voting_user
      - DB_PASSWORD=voting_pass
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=*
    depends_on:
      - db
      - redis
    volumes:
      - static_data:/app/Home/staticfiles
      - media_data:/app/Home/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn Home.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  celery:
    build: .
    environment:
      - DJANGO_SECRET_KEY=super-secret-production-key-change-me
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=voting_db
      - DB_USER=voting_user
      - DB_PASSWORD=voting_pass
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: >
      sh -c "cd /app/Home && celery -A Home worker -l info"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_data:
  media_data:
